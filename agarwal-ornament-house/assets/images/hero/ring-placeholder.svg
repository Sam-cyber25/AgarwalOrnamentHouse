<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-labelledby="title desc">
  <title id="title">Ring placeholder</title>
  <desc id="desc">Decorative placeholder illustration for a jewellery ring.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8C84A" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#D4AF37" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="600" fill="#141414"/>
  <circle cx="300" cy="300" r="180" fill="url(#glow)"/>
  <ellipse cx="300" cy="330" rx="130" ry="150" fill="none" stroke="#D4AF37" stroke-width="42"/>
  <circle cx="300" cy="160" r="78" fill="#F5F3F0" stroke="#D4AF37" stroke-width="18"/>
  <text x="300" y="540" text-anchor="middle" fill="#F5F3F0" font-family="Inter, Arial, sans-serif" font-size="28" letter-spacing="4">RING PLACEHOLDER</text>
</svg>
