<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" role="img" aria-labelledby="title desc">
  <title id="title">Agarwal Ornament House dark logo</title>
  <desc id="desc">Wordmark logo for Agarwal Ornament House in dark text on a light background.</desc>
  <rect width="420" height="120" fill="#F5F3F0"/>
  <line x1="20" y1="22" x2="400" y2="22" stroke="#D4AF37" stroke-width="2"/>
  <line x1="20" y1="98" x2="400" y2="98" stroke="#D4AF37" stroke-width="2"/>
  <text x="210" y="50" text-anchor="middle" fill="#1C1C1C" font-family="'Cormorant Garamond', Georgia, serif" font-size="34" letter-spacing="7">AGARWAL</text>
  <text x="210" y="78" text-anchor="middle" fill="#D4AF37" font-family="Inter, Arial, sans-serif" font-size="16" letter-spacing="6">ORNAMENT HOUSE</text>
</svg>
